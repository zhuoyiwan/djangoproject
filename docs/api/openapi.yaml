openapi: 3.0.3
info:
  title: ChatOps CMDB Backend API
  version: 0.2.0
  description: Phase 1 backend API for auth, CMDB, audit, automation, and agent signed
    ingest.
paths:
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
